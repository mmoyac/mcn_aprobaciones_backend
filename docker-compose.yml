
version: '3.8'



services:
  backend:
    build: .
    container_name: mcn_aprobaciones_backend
    ports:
      - "8050:8000"
    environment:
      # Variables de Base de Datos
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - API_KEY=${API_KEY}
      # Base de datos PDFs del cliente
      - REPPDF_HOST=${REPPDF_HOST:-179.27.210.204}
      - REPPDF_PORT=${REPPDF_PORT:-3306}
      - REPPDF_DB=${REPPDF_DB:-lexascl_reppdf}
      - REPPDF_USER=${REPPDF_USER}
      - REPPDF_PASSWORD=${REPPDF_PASSWORD}
      # ConfiguraciĂ³n de la aplicaciĂ³n
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-False}
      - API_V1_PREFIX=${API_V1_PREFIX:-/api/v1}
      # Seguridad
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    volumes:
      - ./logs:/app/logs
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcn_network

  postgres:
    image: postgres:15-alpine
    container_name: mcn_aprobaciones_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5450:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mcn_network


networks:
  mcn_network:
    driver: bridge
